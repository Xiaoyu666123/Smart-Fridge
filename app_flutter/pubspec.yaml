name: smartfridge
description: "智能冰箱食材管理系统 - Android 原生端（Flutter）"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 网络
  dio: ^5.7.0

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # 本地存储（非敏感配置）
  shared_preferences: ^2.3.3

  # 安全存储（token / 密码等敏感信息）
  flutter_secure_storage: ^9.2.4

  # 图表（镜像 ECharts 用）
  fl_chart: ^0.69.2

  # 日期格式化
  intl: ^0.19.0

  # 拍照 / 选图（食材识别用）
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
